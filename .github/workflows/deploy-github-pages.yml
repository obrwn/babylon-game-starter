name: Deploy GitHub Pages

on:
  push:
    branches: [gh-deploy]
  # For workflow_dispatch, use this same branch (gh-deploy) so environment rules match on.push.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  assert_deploy_branch:
    runs-on: ubuntu-latest
    steps:
      - name: Enforce gh-deploy for manual runs
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${GITHUB_REF}" != "refs/heads/gh-deploy" ]; then
            echo "::error::GitHub Pages deploy is only supported from gh-deploy. Open Actions → this workflow → Run workflow and set \"Use workflow from\" to gh-deploy, or push to gh-deploy. (Ref: ${GITHUB_REF})"
            exit 1
          fi

  build:
    runs-on: ubuntu-latest
    needs: assert_deploy_branch
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
