name: Deploy GitHub Pages

on:
  push:
    branches: ["gh-deploy"]
  # Only gh-deploy is a valid ref (see assert_deploy_branch). Pushes to other branches do not match on.push.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  assert_deploy_branch:
    runs-on: ubuntu-latest
    steps:
      - name: Only deploy branch may reach the github-pages environment
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/gh-deploy" ]; then
            echo "::error::Pages deploy runs only on ref gh-deploy (push uses on.push; for Run workflow set Use workflow from to gh-deploy). Current ref: ${GITHUB_REF}"
            exit 1
          fi

  build:
    runs-on: ubuntu-latest
    needs: assert_deploy_branch
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    if: ${{ github.ref == 'refs/heads/gh-deploy' }}
    environment:
      name: "github-pages"
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
